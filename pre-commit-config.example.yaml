# Example .pre-commit-config.yaml
# Copy this to your project and adjust the rev to the latest release tag.

repos:
  - repo: https://github.com/migradiff/migra
    rev: v1.1.0
    hooks:
      - id: migra
        args:
          - --schema
          - public
        env:
          MIGRA_BASE_URL: postgresql://localhost/db_production
          MIGRA_HEAD_URL: postgresql://localhost/db_branch
