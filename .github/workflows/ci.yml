name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  PGUSER: postgres
  PGHOST: localhost
  PGPORT: 5432

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install flake8 black

      - name: Lint with flake8
        run: flake8

      - name: Check formatting with black
        run: black --check .

  test:
    name: Test
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        postgres-version: ["14", "15", "16", "17"]

    services:
      postgres:
        image: postgres:${{ matrix.postgres-version }}
        env:
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies
        run: |
          python -m pip install --upgrade pip
          pip install setuptools  # Explicit, before anything else

      - name: Install dependencies
        run: |
          pip install wheel pytest psycopg2-binary

      - name: Install MigraDiff with AI support
        run: |
          pip install -e ".[dev,ai]"

      - name: Create database user
        run: |
          psql -U postgres -h localhost -c "CREATE ROLE runner SUPERUSER LOGIN;"

      - name: Run tests
        run: |
          python -m pytest -v

  coverage:
    name: Coverage
    needs: test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools
          pip install pytest pytest-cov psycopg2-binary

      - name: Install MigraDiff
        run: |
          pip install -e ".[dev,ai]"

      - name: Create database user
        run: |
          psql -U postgres -h localhost -c "CREATE ROLE runner SUPERUSER LOGIN;"

      - name: Run tests with coverage
        run: |
          python -m pytest --cov=migra --cov-report=term-missing
